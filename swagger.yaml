openapi: 3.0.1
info:
  title: Go Cron Job API
  version: 1.0.0
  description: API for managing long-running cron jobs
servers:
  - url: http://localhost:8080
paths:
  /jobs:
    get:
      summary: List all jobs
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
    post:
      summary: Create a new job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobInput'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /jobs/{id}:
    get:
      summary: Get a job by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
    put:
      summary: Update a job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobInput'
      responses:
        '200':
          description: Job updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          description: Job not found
    delete:
      summary: Delete a job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Job deleted
        '404':
          description: Job not found
  /jobs/{id}/run:
    post:
      summary: Run a job immediately
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Job started
        '404':
          description: Job not found
components:
  schemas:
    Job:
      type: object
      required:
        - id
        - name
        - schedule
        - command
        - status
      properties:
        id:
          type: string
          description: Unique identifier for the job.
        name:
          type: string
          description: Name of the job.
        schedule:
          type: string
          description: Cron schedule expression for the job.
        command:
          type: string
          description: Command to be executed by the job (simulated).
        last_run:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last time the job was run.
        next_run:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the next scheduled run.
        status:
          type: string
          description: Current status of the job (e.g., scheduled, running).
    JobInput:
      type: object
      description: |
        Input for creating or updating a job. The 'id' field is not required and will be generated by the server if omitted.
      properties:
        name:
          type: string
          description: Name of the job.
        schedule:
          type: string
          description: Cron schedule expression for the job.
        command:
          type: string
          description: Command to be executed by the job (simulated).
      required:
        - name
        - schedule
        - command 